name: App QM

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "platform/**"
      - "scripts/app-qm-check.mjs"
      - ".github/workflows/app-qm.yml"
  pull_request:
    paths:
      - "app/**"
      - "platform/**"
      - "scripts/app-qm-check.mjs"
      - ".github/workflows/app-qm.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync app JavaScript
        run: node scripts/sync-app-files.mjs

      - name: Run app QM checks
        run: node scripts/app-qm-check.mjs

  browser-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser:
          - chromium
          - firefox
          - webkit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync app JavaScript
        run: node scripts/sync-app-files.mjs

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.54.2
          npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run browser smoke test
        run: node scripts/app-browser-smoke.mjs ${{ matrix.browser }}
